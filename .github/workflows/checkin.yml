name: Mihoyo Daily Check-in

on:
  schedule:
    # GitHub 定时是"尽力而为"，整点/半点最挤、易被延迟甚至跳过，所以错开整点 + 多设兜底时间。
    # cron 用 UTC。脚本对"已签到"会跳过，所以一天多跑几次也不会重复签到。
    - cron: "23 0 * * *"   # UTC 0:23 = 北京 8:23
    - cron: "47 3 * * *"   # UTC 3:47 = 北京 11:47（上一次没跑成功时兜底）
    - cron: "13 8 * * *"   # UTC 8:13 = 北京 16:13（再兜一次，确保当天不断签）
  workflow_dispatch: {}        # 允许在 Actions 页面手动触发，方便测试

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check-in
        env:
          COOKIE: ${{ secrets.COOKIE }}
          SCT_KEY: ${{ secrets.SCT_KEY }}
        run: python sign.py
